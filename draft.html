<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#013369" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Draft Sim" />
  <title>NFL Mock Draft Simulator — Sports-Hub Labs</title>
  <meta name="description" content="A client-side NFL mock draft simulator — pick your team, set the order, and run the war room." />
  <link rel="icon" type="image/png" href="favicon.png?v=9" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=9" />
  <link rel="stylesheet" href="styles.css?v=80" />
  <link rel="stylesheet" href="draft.css?v=2" />
</head>
<body class="ds-body">
  <header class="ds-top">
    <div class="ds-brand">
      <span class="ds-shield">🏈</span>
      <h1>Mock Draft Sim<small>Sports-Hub Labs</small></h1>
    </div>
    <a class="ds-back" href="index.html">← Back to Sports-Hub</a>
  </header>

  <main class="ds-main">
    <section id="setup" hidden></section>

    <section id="warroom" hidden>
      <div id="wr-bar"></div>
      <div class="wr-grid">
        <div class="wr-main">
          <div id="board-controls"></div>
          <div id="board-list"></div>
        </div>
        <aside class="wr-side">
          <div id="side-tabs"></div>
          <div id="side-content"></div>
        </aside>
      </div>
    </section>

    <section id="recap" hidden></section>
  </main>

  <div id="trade-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="trade-card"></div>
  </div>

  <script src="draft.js?v=5" defer></script>
</body>
</html>
